name: Tracked deal alerts

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  check-tracked-deals:
    name: Check tracked deals
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/internal/check-tracked-deals
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          ALERTS_CRON_SECRET: ${{ secrets.ALERTS_CRON_SECRET }}
        run: |
          if [ -z "$API_BASE_URL" ] || [ -z "$ALERTS_CRON_SECRET" ]; then
            echo "::warning::Skipping — set API_BASE_URL and ALERTS_CRON_SECRET repository secrets."
            exit 0
          fi
          curl --fail-with-body --show-error --silent \
            -X POST \
            -H "X-Alerts-Cron-Secret: ${ALERTS_CRON_SECRET}" \
            "${API_BASE_URL%/}/api/internal/check-tracked-deals"
